<!DOCTYPE html>
<html lang="en" data-theme="{{ site.color_theme }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌱</text></svg>">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  {% seo %}
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a class="site-title" href="{{ '/' | relative_url }}"><span aria-hidden="true">🌱</span> anna neumann</a>
      <nav>
        <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>home</a>
        <a href="{{ '/about/' | relative_url }}" {% if page.url contains 'about' %}class="active"{% endif %}>about</a>
        <a href="{{ '/publications/' | relative_url }}" {% if page.url contains 'publications' %}class="active"{% endif %}>publications</a>
        <a href="{{ '/events/' | relative_url }}" {% if page.url contains 'events' %}class="active"{% endif %}>events</a>
        <a href="{{ '/teaching/' | relative_url }}" {% if page.url contains 'teaching' %}class="active"{% endif %}>teaching</a>
        <a href="{{ '/gallery/' | relative_url }}" {% if page.url contains 'gallery' %}class="active"{% endif %}>gallery</a>
      </nav>
    </div>
  </header>

  <main class="container">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>made with matcha 🍵</p>
      <p>&copy; {{ site.time | date: '%Y' }} anna neumann</p>
    </div>
  </footer>
</body>
</html>
